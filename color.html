<!DOCTYPE html>
<html>
  <head>
    <title>color</title>
    <style>
      h1.one {
        background-color: lightblue;
        border: 10px double Tomato;
      }
      
      h1.two {
        background-color: yellow;
        border: 3px solid DodgerBlue;
        border-radius: 10px;
      }

      h1.three {
        background-color: MediumSeaGreen;
        border: 11px dotted grey;
      }
    </style>
  </head>
  <body>
  
    <h1 class="one">Hello World</h1>
    <h1 class="two">Hello World</h1>
    <h1 class="three">Hello World</h1>
  
  </body>
</html>
