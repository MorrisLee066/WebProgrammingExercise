<!DOCTYPE html>
<html>
  <head>
    <title>form</title>

      <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f5f5;
      padding: 40px;
    }

    .container {
      width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    .image-box {
      width: 100%;
      height: 240px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .image-box img {
      max-width: 100%;
      max-height: 100%;
    }

    .custom-btn {
      height: 22px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #2f2f2f;
      background: #ffffff;
      font-size: 13px;
      color: #2f2f2f;
      cursor: pointer;
    }

    .custom-btn:hover {
      background: #f0f0f0;
    }

    .details {
      margin-top: 15px;
      padding: 10px;
      background: #eaffea;
      border: 1px solid #cceccc;
      display: none;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="image-box">
      <img src="https://picsum.photos/450/240" alt="sample image">
    </div>

    <button class="custom-btn" onclick="toggleDetails()">
      Show Details
    </button>

    <div class="details" id="details">
      <p><strong>Image Name:</strong> sample.jpg</p>
      <p><strong>Size:</strong> 450 x 240</p>
      <p><strong>Date:</strong> 2026/04/22</p>
      <p><strong>Source:</strong> demo link</p>
    </div>

  </div>

  <script>
    function toggleDetails() {
      const details = document.getElementById("details");
      if (details.style.display === "none" || details.style.display === "") {
        details.style.display = "block";
      } else {
        details.style.display = "none";
      }
    }
  </script>

</body>
</html>
