<!DOCTYPE html>
<html>
  <head>
    <title>tables</title>
    <style>
      table, th, td {
      	border: 1.6px solid black;
        border-collapse: collapse;
        width: 150px;
        height: 20px;
        padding: 5px;
      }
      th {
      	background-color: grey;
        color: white;
      }
      tr:nth-child(even) {
      	background-color: yellow
      }
      div.fixed {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 100px;
        height: 100px;
        border: 3px solid #73AD21;
      }
    </style>
  </head>
  <body>
  
    <table>
      <tr>
        <th>Firstname</th>
        <th>Lastname</th>
      </tr>
      <tr>
        <td>1</td>
        <td>1</td>
      </tr>
      <tr>
        <td>2</td>
        <td>2</td>
      </tr>
      <tr>
        <td>3</td>
        <td>3</td>
      </tr>
    </table>
  
  	<div class="fixed">
    	This div element has position: fixed;
    </div>
  </body>
</html>
