<!DOCTYPE html>
<html>
  <head>
    <title>outline</title>
    <style>
      h1 {
      	text-shadow: 3px 2px 0.5px pink;
        text-decoration: overline;
      }
      
      h2 {
        font-style: italic;
        border: 1.4px solid;
        outline: 2.8px outset yellow;
      }

      h3 {
      	text-align: right;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
  
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <h3>This is heading 3</h3>
  
  </body>
</html>
