<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Eco Sorting Challenge</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, sans-serif;
  background:#8dd6ff;
  overflow:hidden;
}

/* =====================
   遊戲區域
===================== */
#game{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:
  linear-gradient(to bottom,#8dd6ff 0%,#c7f0ff 55%,#86c96e 56%,#5ca74a 100%);
}

/* 手機直式 → 強制橫畫面 */
@media screen and (orientation:portrait){
  #game{
    position:absolute;
    top:0;
    left:100vw;

    width:100vh;
    height:100vw;

    transform:rotate(90deg);
    transform-origin:top left;
  }
}

/* =====================
   上方UI
===================== */
#topBar{
  position:absolute;
  top:2vh;
  left:2vw;
  right:2vw;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 愛心 */
#lives{
  display:flex;
  gap:8px;
}

.lifeIcon{
  width:40px;
  height:40px;
  object-fit:contain;
}

/* 計時區 */
#timerWrap{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:20px;
  font-weight:bold;
}

#timerBar{
  width:32vw;
  height:26px;
  background:#ddd;
  border-radius:30px;
  overflow:hidden;
  border:2px solid #333;
}

#timerFill{
  width:100%;
  height:100%;
  background:#ffae00;
  transition:width .1s linear;
}

/* =====================
   中間題目區
===================== */
#questionArea{
  position:absolute;
  top:18%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

#garbageImg{
  width:170px;
  height:170px;
  object-fit:contain;
}

#garbageName{
  margin-top:12px;
  font-size:28px;
  font-weight:bold;
  color:#222;
}

/* =====================
   下方垃圾桶
===================== */
#bins{
  position:absolute;
  bottom:4vh;
  width:100%;
  display:flex;
  justify-content:space-evenly;
  align-items:flex-end;
}

.bin{
  width:18%;
  text-align:center;
  cursor:pointer;
}

.bin img{
  width:100%;
  max-height:150px;
  object-fit:contain;
}

.binLabel{
  margin-top:6px;
  background:rgba(255,255,255,.85);
  padding:6px;
  border-radius:10px;
  font-weight:bold;
}

/* =====================
   回饋視窗
===================== */
#feedback{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:62%;
  background:rgba(255,255,255,.95);
  border-radius:20px;
  padding:28px;
  text-align:center;
  display:none;
  box-shadow:0 0 20px rgba(0,0,0,.25);
}

#feedbackTitle{
  font-size:36px;
  font-weight:bold;
  margin-bottom:16px;
}

.correctText{color:#12a312;}
.wrongText{color:#d90000;}

#feedbackDesc{
  font-size:22px;
  line-height:1.6;
  color:#333;
}

#nextBtn{
  margin-top:20px;
  padding:12px 34px;
  border:none;
  border-radius:12px;
  background:#ffae00;
  font-size:22px;
  cursor:pointer;
}

/* =====================
   結束畫面
===================== */
#gameOver{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
}

#gameOverBox{
  width:420px;
  background:#fff;
  color:#222;
  border-radius:20px;
  padding:32px;
  text-align:center;
}

#gameOverBox h1{
  font-size:42px;
  margin-bottom:18px;
}

#scoreText{
  font-size:28px;
  margin-bottom:24px;
}

.endBtn{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  font-size:22px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.playAgain{background:#ffae00;}
.homeBtn{background:#58b7ff;}
</style>
</head>

<body>

<div id="game">

  <!-- 上方 -->
  <div id="topBar">

    <!-- 愛心圖示（自行放網址） -->
    <div id="lives"></div>

    <div id="timerWrap">
      <span>倒數計時</span>
      <div id="timerBar">
        <div id="timerFill"></div>
      </div>
    </div>
  </div>

  <!-- 題目 -->
  <div id="questionArea">
    <img id="garbageImg" src="" alt="">
    <div id="garbageName"></div>
  </div>

  <!-- 垃圾桶 -->
  <div id="bins">

    <div class="bin" data-type="general">
      <img src="一般垃圾桶圖片網址">
      <div class="binLabel">一般垃圾</div>
    </div>

    <div class="bin" data-type="recycle">
      <img src="資源回收桶圖片網址">
      <div class="binLabel">資源回收</div>
    </div>

    <div class="bin" data-type="food">
      <img src="廚餘桶圖片網址">
      <div class="binLabel">廚餘回收</div>
    </div>

    <div class="bin" data-type="other">
      <img src="其他垃圾桶圖片網址">
      <div class="binLabel">其他</div>
    </div>

  </div>

  <!-- 答題回饋 -->
  <div id="feedback">
    <div id="feedbackTitle"></div>
    <div id="feedbackDesc"></div>
    <button id="nextBtn">下一題</button>
  </div>

  <!-- 結束 -->
  <div id="gameOver">
    <div id="gameOverBox">
      <h1>挑戰結束</h1>
      <div id="scoreText"></div>

      <button class="endBtn playAgain"
      onclick="location.reload()">再來一次</button>

      <button class="endBtn homeBtn"
      onclick="location.reload()">回首頁</button>
    </div>
  </div>

</div>

<script>
/* =========================
   圖片網址（自行替換）
========================= */
const heartImg = "愛心圖片網址";

/* =========================
   題庫
========================= */
const garbageList = [
{
 name:"塑膠保鮮盒",
 img:"垃圾圖片網址1",
 type:"recycle",
 desc:"請簡易清潔後，交給清潔隊循線回收車。"
},
{
 name:"衛生紙",
 img:"垃圾圖片網址2",
 type:"general",
 desc:"使用後無法回收，請丟一般垃圾。"
},
{
 name:"香蕉皮",
 img:"垃圾圖片網址3",
 type:"food",
 desc:"可作為廚餘回收。"
},
{
 name:"電池",
 img:"垃圾圖片網址4",
 type:"other",
 desc:"請交至指定回收點處理。"
}
];

/* =========================
   變數
========================= */
let lives = 5;
let score = 0;
let currentItem;
let timeLimit = 10;
let endTime;
let timerLoop;
let paused = false;

/* =========================
   DOM
========================= */
const livesEl = document.getElementById("lives");
const garbageImg = document.getElementById("garbageImg");
const garbageName = document.getElementById("garbageName");
const timerFill = document.getElementById("timerFill");
const feedback = document.getElementById("feedback");
const feedbackTitle = document.getElementById("feedbackTitle");
const feedbackDesc = document.getElementById("feedbackDesc");

/* =========================
   愛心
========================= */
function renderLives(){
  livesEl.innerHTML = "";

  for(let i=0;i<lives;i++){
    livesEl.innerHTML +=
    `<img class="lifeIcon" src="${heartImg}">`;
  }
}

/* =========================
   出題
========================= */
function nextQuestion(){

  feedback.style.display = "none";

  currentItem =
  garbageList[Math.floor(Math.random()*garbageList.length)];

  garbageImg.src = currentItem.img;
  garbageName.innerText = currentItem.name;

  startTimer();
}

/* =========================
   真倒數（切頁仍持續）
========================= */
function startTimer(){

  clearInterval(timerLoop);

  endTime = Date.now() + timeLimit*1000;

  timerLoop = setInterval(()=>{

    if(paused) return;

    let remain = endTime - Date.now();

    if(remain <= 0){
      clearInterval(timerLoop);
      loseLife();
      nextQuestion();
      return;
    }

    let percent = remain / (timeLimit*1000) *100;
    timerFill.style.width = percent + "%";

  },50);
}

/* =========================
   防切頁作弊
========================= */
document.addEventListener("visibilitychange",()=>{

  if(document.hidden){
    loseLife();     // 離開頁面直接扣血
  }

});

/* =========================
   扣命
========================= */
function loseLife(){
  lives--;
  renderLives();

  if(lives<=0){
    gameOver();
  }
}

/* =========================
   作答
========================= */
document.querySelectorAll(".bin").forEach(bin=>{

  bin.onclick = ()=>{

    clearInterval(timerLoop);

    let user = bin.dataset.type;
    let correct = currentItem.type === user;

    if(correct){
      score++;
      feedbackTitle.innerHTML =
      `<span class="correctText">正確！</span>`;
    }else{
      loseLife();
      feedbackTitle.innerHTML =
      `<span class="wrongText">錯誤！</span>`;
    }

    feedbackDesc.innerHTML =
    `為 ${getTypeName(currentItem.type)}<br>${currentItem.desc}`;

    feedback.style.display = "block";
  };

});

/* =========================
   下一題
========================= */
document.getElementById("nextBtn").onclick = ()=>{

  if(score>0 && score%3===0 && timeLimit>4){
    timeLimit -= 1;
  }

  if(lives>0){
    nextQuestion();
  }
};

/* =========================
   結束
========================= */
function gameOver(){
  clearInterval(timerLoop);

  document.getElementById("scoreText").innerText =
  "本次答對 " + score + " 題";

  document.getElementById("gameOver").style.display = "flex";
}

/* =========================
   中文名稱
========================= */
function getTypeName(type){

  if(type==="general") return "一般垃圾";
  if(type==="recycle") return "資源回收";
  if(type==="food") return "廚餘回收";
  return "其他";
}

/* =========================
   開始
========================= */
renderLives();
nextQuestion();
</script>

</body>
</html>
