<!DOCTYPE html>
<html>
<head>
<title>Image Info Button</title>

<style>
body{
  margin:0;
  font-family:"Roboto", Arial, sans-serif;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper{
  width:496px;
  background:#ffffff;
  box-sizing:border-box;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:35px;
  background:#f5f5f5;
  padding:0 22px;
  box-sizing:border-box;
}

.preview{
  font-size:13px;
  color:#2f2f2f;
}

.btn{
  height:22px;
  line-height:22px;
  padding:0 18px;
  border-radius:8px;
  border:1px solid #2f2f2f;
  background:#ffffff;
  font-size:13px;
  color:#2f2f2f;
  cursor:pointer;
}

.btn:hover{
  background:#eeeeee;
}

.main{
  height:250px;
  padding:0 0 5px 20px;
  box-sizing:border-box;
}

.scroll-area{
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  box-sizing:border-box;
  scrollbar-gutter: stable;
}

.image-area{
  padding-right:13px;
  padding-top:5px;
  box-sizing:border-box;
}

.image-area img{
  width:100%;
  height:240px;
  object-fit:cover;
  display:block;
}

.info-box{
  margin-top:10px;
  padding-right:26px;
  font-size:13px;
  color:#707070;
  display:none;
  box-sizing:border-box;
}

.row{
  margin-bottom:6px;
  line-height:20px;
}

.scroll-area::-webkit-scrollbar{
  width:13px;
}

.scroll-area::-webkit-scrollbar-track{
  background:transparent;
}

.scroll-area::-webkit-scrollbar-thumb{
  background:#c1c1c1;
  border-radius:4px;
}

.scroll-area::-webkit-scrollbar-thumb:hover{
  background:#a8a8a8;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="top-bar">
    <div class="preview">預覽</div>
    <button class="btn" id="btn" onclick="toggle()">查看資訊</button>
  </div>

  <div class="main">
    <div class="scroll-area">
      <div class="image-area">
        <img src="https://picsum.photos/450/240">
      </div>

      <div class="info-box" id="info">
        <div class="row">修改日期：2017/10/12</div>
        <div class="row">類別：.JPG</div>
        <div class="row">大小：459.7KB</div>
        <div class="row">路徑：https://picsum.photos/450/240</div>
      </div>
    </div>
  </div>
</div>

<script>
function toggle(){
  const el=document.getElementById("info");
  const btn=document.getElementById("btn");
  const isOpen = el.style.display==="block";

  el.style.display = isOpen ? "none" : "block";
  btn.innerText = isOpen ? "查看資訊" : "收起資訊";
}
</script>

</body>
</html>
