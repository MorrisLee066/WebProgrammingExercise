<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Circle Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Circle Calculator</h2>

    <input type="number" id="radius" placeholder="Enter radius" />

    <div>
      <button onclick="calcCircumfrence()">Calculate Circumference</button>
      <button onclick="calcArea()">Calculate Area</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    function calcCircumfrence() {
      const radius = parseFloat(document.getElementById("radius").value);

      if (isNaN(radius) || radius <= 0) {
        document.getElementById("result").innerHTML =
          "Please enter a valid radius.";
        return;
      }

      const circumference = 2 * Math.PI * radius;

      document.getElementById("result").innerHTML =
        "The circumference is " + circumference.toFixed(2);
    }

    function calcArea() {
      const radius = parseFloat(document.getElementById("radius").value);

      if (isNaN(radius) || radius <= 0) {
        document.getElementById("result").innerHTML =
          "Please enter a valid radius.";
        return;
      }

      const area = Math.PI * radius * radius;

      document.getElementById("result").innerHTML =
        "The area is " + area.toFixed(2);
    }
  </script>

</body>
</html>
